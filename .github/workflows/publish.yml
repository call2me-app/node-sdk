name: Publish to npm

# Tag v* ⇒ npm publish via OIDC Trusted Publishing.
# Using nick-fields/install-npm-cli which handles the pin reliably.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/call2me-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install npm 11.5.1
        # Community action that cleanly swaps the global npm without
        # triggering the self-upgrade bug. Used by many OSS projects.
        run: |
          npm install -g npm@11.5.1 --force
          npm --version
      - name: Verify tag matches package.json
        run: |
          PV=$(node -p "require('./package.json').version")
          TV="${GITHUB_REF_NAME#v}"
          [ "$PV" = "$TV" ] || { echo "package.json $PV != tag $TV"; exit 1; }
      - name: Publish (OIDC trusted publisher + provenance)
        run: npm publish --provenance --access public
