name: Publish to npm

# Tag v* ⇒ npm publish via Trusted Publishing (OIDC).
# Trusted publisher is configured at npmjs.com → call2me-sdk → Settings.
#
# Requires npm >= 11.5.1 for the OIDC publish flow. setup-node@v4 ships
# Node 20 + npm 10, so we explicitly upgrade npm in a step.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/call2me-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm to OIDC-capable version
        run: npm install -g npm@latest
      - name: Print versions
        run: |
          node --version
          npm --version
      - name: Verify tag matches package.json
        run: |
          PV=$(node -p "require('./package.json').version")
          TV="${GITHUB_REF_NAME#v}"
          [ "$PV" = "$TV" ] || { echo "package.json $PV != tag $TV"; exit 1; }
      - name: Publish (OIDC trusted publisher + provenance)
        run: npm publish --provenance --access public
