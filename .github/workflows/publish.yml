name: Publish to npm

# Tag v* ⇒ npm publish via Trusted Publishing (OIDC).
# Trusted publisher: configured at npmjs.com → call2me-sdk → Settings.
# OIDC publish needs npm >= 11.5.1. We pin npm explicitly because
# `npm install -g npm@latest` self-upgrade has been buggy
# (promise-retry MODULE_NOT_FOUND on Node 22).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/call2me-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install npm 11 (for OIDC publish)
        # Use corepack-style install — replaces, doesn't self-upgrade.
        run: |
          rm -rf "$(dirname "$(which npm)")/../lib/node_modules/npm"
          curl -fsSL https://registry.npmjs.org/npm/-/npm-11.7.0.tgz | tar -xz -C "$(dirname "$(which npm)")/../lib/node_modules/" --transform 's,^package,npm,'
          npm --version
      - name: Verify tag matches package.json
        run: |
          PV=$(node -p "require('./package.json').version")
          TV="${GITHUB_REF_NAME#v}"
          [ "$PV" = "$TV" ] || { echo "package.json $PV != tag $TV"; exit 1; }
      - name: Publish (OIDC trusted publisher + provenance)
        run: npm publish --provenance --access public
